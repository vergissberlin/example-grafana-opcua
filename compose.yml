services:
  opcua-server:
    build: ./opcua-server
    container_name: opcua-server
    ports:
      - "4840:4840"
    restart: unless-stopped

  opcua-exporter:
    build: ./opcua-exporter
    container_name: opcua-exporter
    environment:
      - OPCUA_ENDPOINT=opc.tcp://opcua-server:4840/vehicle/
    ports:
      - "9686:9686"
    depends_on:
      - opcua-server
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - opcua-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
