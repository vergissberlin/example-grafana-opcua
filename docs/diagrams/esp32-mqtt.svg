<svg viewBox="0 0 780 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', monospace">

  <rect width="780" height="340" fill="#F8FAFC"/>

  <!-- ── ESP32 ── -->
  <rect x="20" y="60" width="140" height="200" rx="10" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="20" y="60" width="140" height="32" rx="10" fill="#1E3A5F"/>
  <rect x="20" y="80" width="140" height="12" fill="#1E3A5F"/>
  <text x="90" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ESP32</text>

  <rect x="32" y="104" width="116" height="20" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="90" y="119" text-anchor="middle" font-size="9.5" fill="#1D4ED8">Sensoren lesen</text>
  <rect x="32" y="130" width="116" height="36" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="90" y="144" text-anchor="middle" font-size="9.5" font-weight="700" fill="#B45309">PubSubClient</text>
  <text x="90" y="160" text-anchor="middle" font-size="8.5" fill="#78350F">mqtt.publish()</text>

  <rect x="32" y="173" width="116" height="56" rx="4" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1"/>
  <text x="90" y="190" text-anchor="middle" font-size="8.5" fill="#78350F">vehicle/RPM</text>
  <text x="90" y="204" text-anchor="middle" font-size="8.5" fill="#78350F">vehicle/EngineTemperature_C</text>
  <text x="90" y="218" text-anchor="middle" font-size="8.5" fill="#78350F">vehicle/OilPressure_bar</text>
  <text x="90" y="232" text-anchor="middle" font-size="8.5" fill="#78350F">...</text>

  <text x="90" y="273" text-anchor="middle" font-size="8.5" fill="#94A3B8">WiFi 802.11</text>

  <!-- ── Arrow ESP32 → Mosquitto ── -->
  <line x1="160" y1="180" x2="208" y2="180" stroke="#F59E0B" stroke-width="2.5"/>
  <polygon points="203,175 215,180 203,185" fill="#F59E0B"/>
  <text x="184" y="173" text-anchor="middle" font-size="8.5" fill="#B45309">MQTT</text>
  <text x="184" y="196" text-anchor="middle" font-size="8.5" fill="#B45309">:1883</text>

  <!-- ── Mosquitto ── -->
  <rect x="215" y="140" width="130" height="80" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="280" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">Mosquitto</text>
  <text x="280" y="179" text-anchor="middle" font-size="9.5" fill="#78350F">Broker :1883</text>
  <rect x="227" y="188" width="106" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="280" y="203" text-anchor="middle" font-size="8.5" fill="#92400E">subscribe: vehicle/#</text>

  <!-- ── Arrow Mosquitto → Bridge ── -->
  <line x1="345" y1="180" x2="388" y2="180" stroke="#F59E0B" stroke-width="2.5"/>
  <polygon points="383,175 395,180 383,185" fill="#F59E0B"/>
  <text x="367" y="173" text-anchor="middle" font-size="8.5" fill="#B45309">paho</text>
  <text x="367" y="196" text-anchor="middle" font-size="8.5" fill="#B45309">mqtt</text>

  <!-- ── MQTT Bridge ── -->
  <rect x="395" y="110" width="160" height="140" rx="10" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="395" y="110" width="160" height="30" rx="10" fill="#374151"/>
  <rect x="395" y="128" width="160" height="12" fill="#374151"/>
  <text x="475" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">mqtt-bridge</text>

  <rect x="408" y="150" width="134" height="24" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="475" y="167" text-anchor="middle" font-size="9.5" fill="#15803D">on_message()</text>
  <rect x="408" y="180" width="134" height="24" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="475" y="197" text-anchor="middle" font-size="9.5" fill="#1D4ED8">node.write_value(v)</text>
  <rect x="408" y="210" width="134" height="32" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="475" y="224" text-anchor="middle" font-size="8.5" fill="#1D4ED8">asyncua Client</text>
  <text x="475" y="237" text-anchor="middle" font-size="8.5" fill="#6B7280">opc.tcp://opcua-server</text>

  <!-- ── Arrow Bridge → OPC-UA Server ── -->
  <line x1="555" y1="180" x2="592" y2="180" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="587,175 599,180 587,185" fill="#3B82F6"/>
  <text x="574" y="173" text-anchor="middle" font-size="8" fill="#1D4ED8">OPC-UA</text>
  <text x="574" y="196" text-anchor="middle" font-size="8" fill="#1D4ED8">:4840</text>

  <!-- ── OPC-UA Server (compact) ── -->
  <rect x="599" y="140" width="150" height="80" rx="8" fill="#1E3A5F" stroke="#2563EB" stroke-width="2"/>
  <text x="674" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">OPC-UA Server</text>
  <text x="674" y="179" text-anchor="middle" font-size="9" fill="#93C5FD">asyncua :4840</text>
  <rect x="611" y="186" width="126" height="24" rx="4" fill="#0F2744" stroke="#22C55E" stroke-width="1"/>
  <text x="674" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#4ADE80">8 OPC-UA Nodes</text>

  <!-- ── Arrow OPC-UA → Exporter ── -->
  <line x1="674" y1="220" x2="674" y2="248" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="669,244 674,256 679,244" fill="#6B7280"/>

  <!-- ── Exporter → Prometheus → Grafana (stacked) ── -->
  <rect x="614" y="256" width="120" height="30" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="674" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#111">Exporter :9686</text>
  <line x1="674" y1="286" x2="674" y2="299" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="669,295 674,307 679,295" fill="#6B7280"/>
  <rect x="614" y="307" width="120" height="26" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="674" y="325" text-anchor="middle" font-size="9.5" font-weight="600" fill="#111">Prometheus :9090</text>

  <!-- ── Docker Compose boundary ── -->
  <rect x="205" y="45" width="590" height="280" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="215" y="40" font-size="9" fill="#94A3B8">Docker Compose Network</text>

  <!-- ── QoS note ── -->
  <rect x="20" y="285" width="170" height="42" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1"/>
  <text x="105" y="300" text-anchor="middle" font-size="9" font-weight="700" fill="#713F12">MQTT QoS Levels</text>
  <text x="105" y="313" text-anchor="middle" font-size="8.5" fill="#713F12">QoS 0 — Demo</text>
  <text x="105" y="324" text-anchor="middle" font-size="8.5" fill="#713F12">QoS 1/2 — Produktion</text>
</svg>
