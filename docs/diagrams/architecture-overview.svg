<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', monospace">

  <!-- background -->
  <rect width="860" height="400" fill="#F8FAFC" rx="0"/>

  <!-- ── ESP32 ──────────────────────────────────────────────────────────── -->
  <rect x="20" y="100" width="150" height="200" rx="10" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="20" y="100" width="150" height="32" rx="10" fill="#1E3A5F"/>
  <rect x="20" y="120" width="150" height="12" fill="#1E3A5F"/>
  <text x="95" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ESP32</text>

  <!-- sensor chips -->
  <rect x="32" y="144" width="126" height="24" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="95" y="161" text-anchor="middle" font-size="10" fill="#1D4ED8">DS18B20  ·  MPX4250</text>
  <rect x="32" y="174" width="126" height="24" rx="5" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="95" y="191" text-anchor="middle" font-size="10" fill="#15803D">Hall RPM  ·  Hall Speed</text>
  <rect x="32" y="204" width="126" height="24" rx="5" fill="#FFF7ED" stroke="#FDC086" stroke-width="1"/>
  <text x="95" y="221" text-anchor="middle" font-size="10" fill="#C2410C">Tankgeber  ·  ADC</text>
  <rect x="32" y="234" width="126" height="24" rx="5" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="95" y="251" text-anchor="middle" font-size="10" fill="#6D28D9">Spannungsteiler  12V</text>
  <rect x="32" y="264" width="126" height="24" rx="5" fill="#FFF1F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="95" y="281" text-anchor="middle" font-size="10" fill="#B91C1C">BLE TPMS  ·  GPIO</text>

  <!-- ── Three connection paths ────────────────────────────────────────── -->

  <!-- Path A: WiFi/HTTP (top, green) -->
  <line x1="170" y1="160" x2="330" y2="160" stroke="#22C55E" stroke-width="2.5"/>
  <polygon points="324,155 336,160 324,165" fill="#22C55E"/>
  <rect x="185" y="140" width="130" height="38" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="250" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">A  WiFi + HTTP</text>
  <text x="250" y="170" text-anchor="middle" font-size="9" fill="#6B7280">POST :4841/sensor</text>

  <!-- Path B: MQTT (middle, amber) -->
  <line x1="170" y1="200" x2="230" y2="200" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Mosquitto box -->
  <rect x="230" y="185" width="100" height="30" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="280" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">Mosquitto</text>
  <line x1="330" y1="200" x2="390" y2="200" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Bridge box -->
  <rect x="390" y="185" width="80" height="30" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="430" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">Bridge</text>
  <line x1="470" y1="200" x2="490" y2="200" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5 3"/>

  <rect x="200" y="222" width="126" height="20" rx="4" fill="none"/>
  <text x="263" y="236" text-anchor="middle" font-size="9" fill="#B45309">B  WiFi + MQTT</text>

  <!-- Path C: Serial (bottom, gray) -->
  <line x1="170" y1="260" x2="230" y2="260" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Host bridge box -->
  <rect x="230" y="245" width="130" height="30" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="295" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">serial-bridge.py</text>
  <line x1="360" y1="260" x2="490" y2="260" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="295" y="290" text-anchor="middle" font-size="9" fill="#94A3B8">C  Serial / USB</text>

  <!-- Arrow A into server -->
  <line x1="490" y1="160" x2="490" y2="200" stroke="#6B7280" stroke-width="1.5"/>

  <!-- ── OPC-UA Server ──────────────────────────────────────────────────── -->
  <rect x="490" y="120" width="170" height="180" rx="10" fill="#1E3A5F" stroke="#2563EB" stroke-width="2"/>
  <text x="575" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">OPC-UA Server</text>
  <text x="575" y="163" text-anchor="middle" font-size="9.5" fill="#93C5FD">:4840  /  :4841</text>

  <rect x="503" y="172" width="144" height="30" rx="5" fill="#0F2744" stroke="#3B82F6" stroke-width="1"/>
  <text x="575" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#60A5FA">node.write_value()</text>

  <rect x="503" y="210" width="144" height="48" rx="5" fill="#0F2744" stroke="#3B82F6" stroke-width="1"/>
  <text x="575" y="228" text-anchor="middle" font-size="9" fill="#93C5FD">Speed · RPM · Temp</text>
  <text x="575" y="243" text-anchor="middle" font-size="9" fill="#93C5FD">Fuel · Oil · Batt</text>
  <text x="575" y="258" text-anchor="middle" font-size="9" fill="#93C5FD">TirePressure · Faults</text>

  <rect x="503" y="266" width="144" height="24" rx="5" fill="#0F2744" stroke="#22C55E" stroke-width="1"/>
  <text x="575" y="283" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4ADE80">asyncua</text>

  <!-- merge arrow to server from B/C -->
  <line x1="490" y1="260" x2="490" y2="220" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="486,224 490,212 494,224" fill="#6B7280"/>

  <!-- ── Arrow Server → Exporter ─────────────────────────────────────────── -->
  <line x1="660" y1="210" x2="700" y2="210" stroke="#6B7280" stroke-width="2"/>
  <polygon points="696,205 708,210 696,215" fill="#6B7280"/>

  <!-- ── Exporter ────────────────────────────────────────────────────────── -->
  <rect x="700" y="182" width="140" height="56" rx="8" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="770" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#111">OPC-UA Exporter</text>
  <text x="770" y="218" text-anchor="middle" font-size="9.5" fill="#6B7280">Prometheus Gauges</text>
  <text x="770" y="232" text-anchor="middle" font-size="9.5" fill="#6B7280">:9686/metrics</text>

  <!-- ── Arrow Exporter → Prometheus ────────────────────────────────────── -->
  <line x1="770" y1="238" x2="770" y2="280" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="765,276 770,288 775,276" fill="#6B7280"/>

  <!-- ── Prometheus ──────────────────────────────────────────────────────── -->
  <rect x="700" y="288" width="140" height="44" rx="8" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="770" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#111">Prometheus</text>
  <text x="770" y="323" text-anchor="middle" font-size="9.5" fill="#6B7280">:9090  scrape 15 s</text>

  <!-- ── Arrow Prometheus → Grafana ─────────────────────────────────────── -->
  <line x1="770" y1="332" x2="770" y2="350" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="765,346 770,358 775,346" fill="#6B7280"/>

  <!-- ── Grafana ─────────────────────────────────────────────────────────── -->
  <rect x="700" y="358" width="140" height="30" rx="8" fill="#1E3A5F" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="770" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#FCD34D">Grafana  :3000</text>

  <!-- ── Legend ─────────────────────────────────────────────────────────── -->
  <line x1="20" y1="382" x2="40" y2="382" stroke="#22C55E" stroke-width="2.5"/>
  <text x="46" y="386" font-size="9.5" fill="#15803D">A — WiFi / HTTP (empfohlen)</text>
  <line x1="195" y1="382" x2="215" y2="382" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="221" y="386" font-size="9.5" fill="#B45309">B — WiFi / MQTT</text>
  <line x1="340" y1="382" x2="360" y2="382" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="366" y="386" font-size="9.5" fill="#64748B">C — Serial / USB</text>
</svg>
