<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', monospace">

  <rect width="820" height="500" fill="#F8FAFC"/>

  <!-- ══ ESP32 DevKitC (center) ══ -->
  <rect x="305" y="80" width="210" height="340" rx="10" fill="#1E3A5F" stroke="#2563EB" stroke-width="2"/>
  <!-- PCB texture -->
  <rect x="305" y="80" width="210" height="340" rx="10" fill="url(#pcb)" opacity="0.15"/>

  <text x="410" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ESP32 DevKitC</text>
  <text x="410" y="122" text-anchor="middle" font-size="9" fill="#93C5FD">ADC1 Pins (WiFi-safe)</text>

  <!-- Pin rows -->
  <!-- Left pins (sensors side) -->
  <rect x="310" y="136" width="90" height="20" rx="3" fill="#0F2744" stroke="#3B82F6" stroke-width="1"/>
  <text x="355" y="151" text-anchor="middle" font-size="9.5" fill="#60A5FA">GPIO34 — RPM</text>

  <rect x="310" y="162" width="90" height="20" rx="3" fill="#0F2744" stroke="#3B82F6" stroke-width="1"/>
  <text x="355" y="177" text-anchor="middle" font-size="9.5" fill="#60A5FA">GPIO35 — Speed</text>

  <rect x="310" y="188" width="90" height="20" rx="3" fill="#0F2744" stroke="#22C55E" stroke-width="1"/>
  <text x="355" y="203" text-anchor="middle" font-size="9.5" fill="#4ADE80">GPIO32 — DS18B20</text>

  <rect x="310" y="214" width="90" height="20" rx="3" fill="#0F2744" stroke="#F59E0B" stroke-width="1"/>
  <text x="355" y="229" text-anchor="middle" font-size="9.5" fill="#FCD34D">GPIO36 — Fuel</text>

  <rect x="310" y="240" width="90" height="20" rx="3" fill="#0F2744" stroke="#F59E0B" stroke-width="1"/>
  <text x="355" y="255" text-anchor="middle" font-size="9.5" fill="#FCD34D">GPIO33 — Oil</text>

  <rect x="310" y="266" width="90" height="20" rx="3" fill="#0F2744" stroke="#A78BFA" stroke-width="1"/>
  <text x="355" y="281" text-anchor="middle" font-size="9.5" fill="#C4B5FD">GPIO39 — Batt</text>

  <rect x="310" y="292" width="90" height="20" rx="3" fill="#0F2744" stroke="#F87171" stroke-width="1"/>
  <text x="355" y="307" text-anchor="middle" font-size="9.5" fill="#FCA5A5">GPIO26 — Fault1</text>

  <rect x="310" y="318" width="90" height="20" rx="3" fill="#0F2744" stroke="#F87171" stroke-width="1"/>
  <text x="355" y="333" text-anchor="middle" font-size="9.5" fill="#FCA5A5">GPIO27 — Fault2</text>

  <!-- Right side: power + BLE note -->
  <rect x="415" y="136" width="90" height="20" rx="3" fill="#0F2744" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="151" text-anchor="middle" font-size="9.5" fill="#9CA3AF">3.3 V — VCC</text>

  <rect x="415" y="162" width="90" height="20" rx="3" fill="#0F2744" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="177" text-anchor="middle" font-size="9.5" fill="#9CA3AF">GND</text>

  <rect x="415" y="292" width="90" height="46" rx="5" fill="#0F2744" stroke="#818CF8" stroke-width="1.5"/>
  <text x="460" y="310" text-anchor="middle" font-size="9.5" font-weight="600" fill="#818CF8">BLE Scan</text>
  <text x="460" y="325" text-anchor="middle" font-size="8.5" fill="#818CF8">TPMS Sensoren</text>
  <text x="460" y="338" text-anchor="middle" font-size="8.5" fill="#818CF8">4 × Reifendruck</text>

  <!-- WiFi + OPC-UA badge -->
  <rect x="330" y="360" width="160" height="48" rx="5" fill="#0F2744" stroke="#22C55E" stroke-width="1.5"/>
  <text x="410" y="378" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4ADE80">WiFi → OPC-UA Server</text>
  <text x="410" y="393" text-anchor="middle" font-size="8.5" fill="#86EFAC">HTTP POST / MQTT publish</text>
  <text x="410" y="406" text-anchor="middle" font-size="8.5" fill="#6B7280">Serial JSON → Bridge</text>

  <!-- ══ Left side: Sensors ══ -->

  <!-- Hall RPM -->
  <rect x="30" y="128" width="130" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="95" y="144" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">Hall RPM (AH3144)</text>
  <text x="95" y="158" text-anchor="middle" font-size="8.5" fill="#6B7280">Verteilerrotor  ·  4-Takt</text>
  <!-- wire -->
  <line x1="160" y1="146" x2="308" y2="146" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- 100nF cap symbol -->
  <rect x="218" y="140" width="2" height="12" fill="#3B82F6"/>
  <rect x="222" y="140" width="2" height="12" fill="#3B82F6"/>
  <text x="222" y="135" text-anchor="middle" font-size="7.5" fill="#3B82F6">100nF</text>
  <!-- 10k pull-up -->
  <line x1="234" y1="146" x2="234" y2="128" stroke="#3B82F6" stroke-width="1"/>
  <rect x="228" y="118" width="12" height="6" rx="1" fill="#FEF9C3" stroke="#3B82F6" stroke-width="1"/>
  <text x="234" y="114" text-anchor="middle" font-size="7" fill="#3B82F6">10kΩ</text>
  <line x1="234" y1="118" x2="234" y2="110" stroke="#3B82F6" stroke-width="1"/>
  <text x="234" y="108" text-anchor="middle" font-size="7" fill="#3B82F6">3V3</text>

  <!-- Hall Speed -->
  <rect x="30" y="155" width="130" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="95" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">Hall Speed (AH3144)</text>
  <text x="95" y="184" text-anchor="middle" font-size="8.5" fill="#6B7280">Radnabe  ·  Ø 1.905 m</text>
  <line x1="160" y1="172" x2="308" y2="172" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- DS18B20 -->
  <rect x="30" y="183" width="130" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="95" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">DS18B20</text>
  <text x="95" y="213" text-anchor="middle" font-size="8.5" fill="#6B7280">OneWire  ·  4.7kΩ → 3V3</text>
  <line x1="160" y1="198" x2="308" y2="198" stroke="#22C55E" stroke-width="1.5"/>
  <!-- 4.7k pull-up -->
  <rect x="254" y="189" width="12" height="6" rx="1" fill="#FEF9C3" stroke="#22C55E" stroke-width="1"/>
  <text x="260" y="186" text-anchor="middle" font-size="7" fill="#22C55E">4.7kΩ</text>

  <!-- Fuel (Tankgeber) -->
  <rect x="30" y="214" width="130" height="36" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="95" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">Tankgeber</text>
  <text x="95" y="243" text-anchor="middle" font-size="8.5" fill="#6B7280">0–180 Ω  ·  180Ω Teiler</text>
  <line x1="160" y1="224" x2="308" y2="224" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- 180Ω resistor symbol -->
  <rect x="248" y="218" width="16" height="8" rx="2" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="256" y="215" text-anchor="middle" font-size="7" fill="#F59E0B">180Ω</text>

  <!-- Oil (MPX4250) -->
  <rect x="30" y="245" width="130" height="36" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="95" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">MPX4250AP</text>
  <text x="95" y="275" text-anchor="middle" font-size="8.5" fill="#6B7280">0–2.5 bar  ·  10k/6.8k Teiler</text>
  <line x1="160" y1="250" x2="308" y2="250" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- divider symbol -->
  <rect x="244" y="244" width="12" height="6" rx="1" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="250" y="241" text-anchor="middle" font-size="7" fill="#F59E0B">10kΩ</text>
  <rect x="244" y="252" width="12" height="6" rx="1" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="250" y="265" text-anchor="middle" font-size="7" fill="#F59E0B">6.8kΩ</text>

  <!-- Battery Voltage -->
  <rect x="30" y="275" width="130" height="36" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="95" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#6D28D9">12V Batt (Teiler)</text>
  <text x="95" y="304" text-anchor="middle" font-size="8.5" fill="#6B7280">10kΩ / 2.7kΩ  ·  max 15V</text>
  <line x1="160" y1="276" x2="308" y2="276" stroke="#7C3AED" stroke-width="1.5"/>
  <!-- 10k+2.7k label -->
  <rect x="244" y="270" width="12" height="6" rx="1" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="250" y="267" text-anchor="middle" font-size="7" fill="#7C3AED">10kΩ</text>
  <rect x="244" y="278" width="12" height="6" rx="1" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="250" y="291" text-anchor="middle" font-size="7" fill="#7C3AED">2.7kΩ</text>

  <!-- Faults (Optocoupler) -->
  <rect x="30" y="310" width="130" height="52" rx="6" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="95" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">Warnleuchten</text>
  <text x="95" y="341" text-anchor="middle" font-size="8.5" fill="#6B7280">12V Optokoppler PC817</text>
  <text x="95" y="355" text-anchor="middle" font-size="8.5" fill="#6B7280">→ 3.3V GPIO isoliert</text>
  <line x1="160" y1="302" x2="308" y2="302" stroke="#F43F5E" stroke-width="1.5"/>
  <line x1="160" y1="328" x2="308" y2="328" stroke="#F43F5E" stroke-width="1.5"/>

  <!-- ══ Right side: Node mapping ══ -->
  <rect x="525" y="80" width="270" height="340" rx="10" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="525" y="80" width="270" height="32" rx="10" fill="#0F172A"/>
  <rect x="525" y="100" width="270" height="12" fill="#0F172A"/>
  <text x="660" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">OPC-UA Nodes</text>

  <!-- node rows -->
  <text x="540" y="130" font-size="9.5" fill="#6B7280">GPIO</text>
  <text x="600" y="130" font-size="9.5" fill="#6B7280">Sensor</text>
  <text x="700" y="130" font-size="9.5" fill="#6B7280">Node</text>
  <line x1="530" y1="135" x2="788" y2="135" stroke="#E2E8F0" stroke-width="1"/>

  <!-- rows -->
  <rect x="530" y="140" width="255" height="24" rx="3" fill="#F0FDF4"/>
  <text x="545" y="157" font-size="9" fill="#374151">GPIO34</text>
  <text x="600" y="157" font-size="9" fill="#374151">Hall RPM</text>
  <text x="700" y="157" font-size="9" font-weight="600" fill="#15803D">RPM</text>

  <rect x="530" y="168" width="255" height="24" rx="3" fill="#EFF6FF"/>
  <text x="545" y="185" font-size="9" fill="#374151">GPIO35</text>
  <text x="600" y="185" font-size="9" fill="#374151">Hall Speed</text>
  <text x="700" y="185" font-size="9" font-weight="600" fill="#1D4ED8">Speed_kmh</text>

  <rect x="530" y="196" width="255" height="24" rx="3" fill="#F0FDF4"/>
  <text x="545" y="213" font-size="9" fill="#374151">GPIO32</text>
  <text x="600" y="213" font-size="9" fill="#374151">DS18B20</text>
  <text x="700" y="213" font-size="9" font-weight="600" fill="#15803D">EngineTemperature_C</text>

  <rect x="530" y="224" width="255" height="24" rx="3" fill="#FFF7ED"/>
  <text x="545" y="241" font-size="9" fill="#374151">GPIO36</text>
  <text x="600" y="241" font-size="9" fill="#374151">Tankgeber ADC</text>
  <text x="700" y="241" font-size="9" font-weight="600" fill="#B45309">FuelLevel_pct</text>

  <rect x="530" y="252" width="255" height="24" rx="3" fill="#FFF7ED"/>
  <text x="545" y="269" font-size="9" fill="#374151">GPIO33</text>
  <text x="600" y="269" font-size="9" fill="#374151">MPX4250 ADC</text>
  <text x="700" y="269" font-size="9" font-weight="600" fill="#B45309">OilPressure_bar</text>

  <rect x="530" y="280" width="255" height="24" rx="3" fill="#F5F3FF"/>
  <text x="545" y="297" font-size="9" fill="#374151">GPIO39</text>
  <text x="600" y="297" font-size="9" fill="#374151">Spannungsteiler</text>
  <text x="700" y="297" font-size="9" font-weight="600" fill="#7C3AED">BatteryVoltage_V</text>

  <rect x="530" y="308" width="255" height="24" rx="3" fill="#FFF1F2"/>
  <text x="545" y="325" font-size="9" fill="#374151">GPIO26/27</text>
  <text x="600" y="325" font-size="9" fill="#374151">Optokoppler</text>
  <text x="700" y="325" font-size="9" font-weight="600" fill="#B91C1C">ActiveFaultCount</text>

  <rect x="530" y="336" width="255" height="24" rx="3" fill="#EEF2FF"/>
  <text x="545" y="353" font-size="9" fill="#374151">BLE</text>
  <text x="600" y="353" font-size="9" fill="#374151">TPMS Sensoren</text>
  <text x="700" y="353" font-size="9" font-weight="600" fill="#4338CA">TirePressure_bar</text>

  <line x1="530" y1="364" x2="788" y2="364" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="530" y="370" width="255" height="40" rx="3" fill="#FEF9C3"/>
  <text x="660" y="386" text-anchor="middle" font-size="8.5" font-weight="700" fill="#713F12">ADC2 (GPIO0–19) meiden!</text>
  <text x="660" y="400" text-anchor="middle" font-size="8.5" fill="#713F12">Unzuverlässig bei aktivem WiFi → nur ADC1</text>

  <!-- arrow from ESP32 right side to node table -->
  <line x1="515" y1="250" x2="525" y2="250" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="521,245 533,250 521,255" fill="#6B7280"/>
</svg>
